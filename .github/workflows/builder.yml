# ============================================================================
# GitHub Actions 工作流：自动构建并发布 Aseprite
# ============================================================================

name: Build and release Aseprite

on:
  push:
    branches:
      - main
    paths:
      - 'BuildLog.md'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  ASEPRITE_REPO: aseprite/aseprite

jobs:
  fetch-aseprite-info:
    name: Fetch Aseprite info
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.get-info.outputs.release-tag }}
      download-link: ${{ steps.get-info.outputs.download-link }}
    steps:
      - name: Get Aseprite release info
        id: get-info
        shell: bash
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/${{ env.ASEPRITE_REPO }}/releases/latest)
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | test("Aseprite-.*?-Source.zip")) | .browser_download_url')
          echo "release-tag=$TAG" >> $GITHUB_OUTPUT
          echo "download-link=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "[OK] Found version: $TAG"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: fetch-aseprite-info
    permissions:
      contents: write
    outputs:
      release-tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
          body: |
            ## Aseprite ${{ needs.fetch-aseprite-info.outputs.release-tag }}
            
            ### Download
            - Windows: `Aseprite-*-Windows.zip`
            - Linux: `Aseprite-*-Linux.zip`
            - macOS (Apple Silicon): `Aseprite-*-macOS.zip`
            
            ### Build Info
            - Build Time: ${{ github.event.repository.updated_at }}
            - Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### Release Notes
            See [Aseprite Official Release Notes](https://github.com/aseprite/aseprite/releases/tag/${{ needs.fetch-aseprite-info.outputs.release-tag }})
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-aseprite:
    name: Build Aseprite on ${{ matrix.os }}
    needs: [fetch-aseprite-info, create-release]
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            skia_url: Skia-Windows-Release-x64.zip
            skia_arch: x64
            platform_name: Windows
            exe_name: aseprite.exe
            generator: Ninja
            cmake_extra: ""
            osx_deployment: ""
            osx_sysroot: ""
            osx_arch: ""
          - os: ubuntu-latest
            skia_url: Skia-Linux-Release-x64.zip
            skia_arch: x64
            platform_name: Linux
            exe_name: aseprite
            generator: Ninja
            cmake_extra: "-DCMAKE_CXX_FLAGS:STRING=-stdlib=libstdc++ -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libstdc++"
            osx_deployment: ""
            osx_sysroot: ""
            osx_arch: ""
          - os: macos-latest
            skia_url: Skia-macOS-Release-arm64.zip
            skia_arch: arm64
            platform_name: macOS
            exe_name: aseprite
            generator: Ninja
            cmake_extra: "-DPNG_ARM_NEON:STRING=on"
            osx_deployment: "11.0"
            osx_sysroot: "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
            osx_arch: "arm64"
      fail-fast: false

    steps:
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            g++ clang cmake ninja-build unzip \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libgl1-mesa-dev libfontconfig1-dev jq

      - uses: actions/checkout@v4

      - name: Clone Aseprite source
        shell: bash
        run: |
          git clone --recurse-submodules -j8 \
            --depth 1 \
            --shallow-submodules \
            --branch ${{ needs.fetch-aseprite-info.outputs.release-tag }} \
            https://github.com/${{ env.ASEPRITE_REPO }}

      - name: Set version number
        working-directory: aseprite
        shell: bash
        run: |
          RAW_VERSION="${{ needs.fetch-aseprite-info.outputs.release-tag }}"
          CLEAN_VERSION=${RAW_VERSION#v}
          echo "Setting version to: $CLEAN_VERSION"
          if [ -f "src/ver/CMakeLists.txt" ]; then
            sed -i "s/set(VERSION \".*\")/set(VERSION \"$CLEAN_VERSION\")/" src/ver/CMakeLists.txt
            echo "[OK] Modified src/ver/CMakeLists.txt"
            echo "Version line after modification:"
            grep "set(VERSION" src/ver/CMakeLists.txt || echo "[WARN] Version line not found"
          else
            echo "[ERROR] src/ver/CMakeLists.txt not found"
            exit 1
          fi
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
        id: set-version

      - name: Get Skia version
        working-directory: aseprite
        shell: bash
        run: |
          SKIA_VERSION="m124-08a5439a6b"
          echo "skia_version=$SKIA_VERSION" >> $GITHUB_OUTPUT
          echo "Using Skia: $SKIA_VERSION"
        id: skia-info

      - name: Cache Skia
        uses: actions/cache@v4
        with:
          path: aseprite/skia
          key: skia-${{ matrix.platform_name }}-${{ steps.skia-info.outputs.skia_version }}
          restore-keys: |
            skia-${{ matrix.platform_name }}-

      - name: Download Skia
        working-directory: aseprite
        shell: bash
        run: |
          SKIA_VER="${{ steps.skia-info.outputs.skia_version }}"
          SKIA_URL="https://github.com/aseprite/skia/releases/download/${SKIA_VER}/${{ matrix.skia_url }}"
          if [ ! -d "skia" ] || [ -z "$(ls -A skia)" ]; then
            echo "Downloading Skia from: $SKIA_URL"
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              choco install wget -y --no-progress
            fi
            wget -q "$SKIA_URL"
            unzip -q *.zip -d skia
            rm *.zip
            echo "[OK] Skia downloaded"
          else
            echo "[OK] Skia cache hit"
          fi

      - uses: aseprite/get-ninja@main

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64

      - name: Generating Makefiles
        working-directory: aseprite
        shell: bash
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=on
          export skia_arch="${{ matrix.skia_arch }}"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export CC=clang
            export CXX=clang++
          fi
          CMAKE_CMD="cmake -S . -B build -G ${{ matrix.generator }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch) \
            -DVERSION=\"${{ steps.set-version.outputs.clean_version }}\""
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            CMAKE_CMD="$CMAKE_CMD \
              -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.osx_deployment }} \
              -DCMAKE_OSX_SYSROOT=${{ matrix.osx_sysroot }}"
          fi
          if [[ -n "${{ matrix.cmake_extra }}" ]]; then
            CMAKE_CMD="$CMAKE_CMD ${{ matrix.cmake_extra }}"
          fi
          echo "Running CMake..."
          eval $CMAKE_CMD

      - name: Compiling
        working-directory: aseprite
        shell: bash
        run: |
          cd build
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            CORES=$(nproc 2>/dev/null || echo 4)
          else
            CORES=$(nproc)
          fi
          echo "Compiling with $CORES cores..."
          ninja -j$CORES aseprite

      - name: Verify build
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./${{ matrix.exe_name }} --version || echo "[WARN] Version check skipped"
          else
            chmod +x ./${{ matrix.exe_name }}
            ./${{ matrix.exe_name }} --version || echo "[WARN] Version check skipped"
          fi

      - name: Clean Up Build folder
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            find . -maxdepth 1 -type f ! -name 'aseprite.exe' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -exec rm -rf {} + 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            find . -maxdepth 1 -type f ! -name 'aseprite' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -a ! -name 'Aseprite.app' -exec rm -rf {} + 2>/dev/null || true
          else
            find . -maxdepth 1 -type f ! -name 'aseprite' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Create portable marker
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          echo '# This file makes Aseprite run in portable mode' > aseprite.ini

      - name: Download OpenSSL DLL
        if: runner.os == 'Windows'
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          echo "Downloading OpenSSL DLL..."
          curl -sL -o openssl.zip https://github.com/openssl/openssl/releases/download/openssl-3.0.13/openssl-3.0.13-x64.zip
          unzip -q openssl.zip
          cp x64/bin/*.dll . 2>/dev/null || true
          rm -rf x64 openssl.zip
          echo "DLL files in build/bin:"
          ls -la *.dll 2>/dev/null || echo "No DLL files"

      - name: Create release package
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          VERSION="${{ steps.set-version.outputs.clean_version }}"
          PLATFORM="${{ matrix.platform_name }}"
          PACKAGE_NAME="Aseprite-${VERSION}-${PLATFORM}"
          7z -tzip -mx=3 -mmt=4 a "${PACKAGE_NAME}.zip" *
          echo "package_name=${PACKAGE_NAME}.zip" >> $GITHUB_OUTPUT
          echo "[OK] Created: ${PACKAGE_NAME}.zip"
        id: package

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/${{ steps.package.outputs.package_name }}
          asset_name: ${{ steps.package.outputs.package_name }}
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1
            }).catch(() => null);
            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body: `[FAIL] Build failed!
                Platform: ${{ matrix.platform_name }}
                Version: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
                Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
              });
            }
