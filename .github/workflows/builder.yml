# ============================================================================
# GitHub Actions 工作流：自动构建并发布 Aseprite
# 
# 功能说明：
# 1. 自动获取 Aseprite 官方最新 Release 版本
# 2. 在 GitHub Releases 中创建对应的发布页面
# 3. 跨平台编译 Windows/Linux/macOS 版本的 Aseprite
# 4. 自动打包并上传到 Release 附件
# 
# 触发条件：
# - 推送到 main 分支且修改了 BuildLog.md 文件
# - 手动触发（workflow_dispatch）
# ============================================================================

name: Build and release Aseprite

on:
  # 当推送到 main 分支且修改了 BuildLog.md 时触发
  push:
    branches:
      - main
    paths:
      - 'BuildLog.md'
  # 允许手动触发工作流
  workflow_dispatch:

# ============================================================================
# 全局环境变量
# ============================================================================
env:
  BUILD_TYPE: Release              # 构建类型：Release（优化性能）
  ASEPRITE_REPO: aseprite/aseprite # Aseprite 官方仓库地址

# ============================================================================
# 任务 1：获取 Aseprite 最新版本信息
# ============================================================================
jobs:
  fetch-aseprite-info:
    name: Fetch Aseprite info
    runs-on: ubuntu-latest          # 在 Ubuntu 上运行（只需 API 调用）
    outputs:
      # 输出给后续任务使用的变量
      release-tag: ${{ steps.get-info.outputs.release-tag }}
      download-link: ${{ steps.get-info.outputs.download-link }}
    steps:
      - name: Get Aseprite release info
        id: get-info
        shell: bash
        run: |
          # 使用 GitHub API 获取最新 Release 信息
          RESPONSE=$(curl -s https://api.github.com/repos/${{ env.ASEPRITE_REPO }}/releases/latest)
          
          # 使用 jq 解析 JSON，提取 Tag 名称
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name')
          
          # 提取 Source.zip 格式的下载链接
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | test("Aseprite-.*?-Source.zip")) | .browser_download_url')
          
          # 将结果写入 GITHUB_OUTPUT，供后续步骤使用
          echo "release-tag=$TAG" >> $GITHUB_OUTPUT
          echo "download-link=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "✓ Found version: $TAG"

  # ==========================================================================
  # 任务 2：创建 GitHub Release
  # ==========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: fetch-aseprite-info     # 依赖任务 1 完成
    permissions:
      contents: write              # 需要写入仓库内容的权限
    outputs:
      release-tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4  # 检出当前仓库代码
      
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
          # Release 描述内容，支持 Markdown 格式
          body: |
            ## Aseprite ${{ needs.fetch-aseprite-info.outputs.release-tag }}
            
            ### 📦 下载说明
            - Windows 用户下载 `Aseprite-*-Windows.zip`
            - Linux 用户下载 `Aseprite-*-Linux.zip`  
            - macOS (Apple Silicon) 用户下载 `Aseprite-*-macOS.zip`
            
            ### 🔧 构建信息
            - 构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - 工作流: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### 📝 更新说明
            请查看 [Aseprite 官方 Release Notes](https://github.com/aseprite/aseprite/releases/tag/${{ needs.fetch-aseprite-info.outputs.release-tag }})
          # 如果 Release 已存在则跳过，避免重复创建
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # 任务 3：编译 Aseprite（多平台）
  # ==========================================================================
  build-aseprite:
    name: Build Aseprite on ${{ matrix.os }}
    needs: [fetch-aseprite-info, create-release]  # 依赖任务 1 和 2
    permissions:
      contents: write              # 需要上传 Release 附件的权限
    runs-on: ${{ matrix.os }}      # 使用矩阵中定义的运行环境
    
    # ------------------------------------------------------------------------
    # 构建矩阵：定义要编译的平台及其特定配置
    # 参考：INSTALL.md 中的平台支持说明
    # ------------------------------------------------------------------------
    strategy:
      matrix:
        include:
          # ---------- Windows 平台 ----------
          # 支持：Windows 11 + VS 2022 + Windows 11 SDK
          # 参考：INSTALL.md 中的 "Windows dependencies" 章节
          - os: windows-latest
            skia_url: Skia-Windows-Release-x64.zip      # Skia 预编译包文件名
            skia_arch: x64                              # Skia 架构
            platform_name: Windows                      # 平台显示名称
            exe_name: aseprite.exe                      # 可执行文件名
            generator: Ninja                            # 使用 Ninja 生成器
            cmake_extra: ""                             # Windows 额外 CMake 参数
            osx_deployment: ""                          # macOS 部署目标（Windows 不需要）
            osx_sysroot: ""                             # macOS 系统根目录（Windows 不需要）
            osx_arch: ""                                # macOS 架构（Windows 不需要）

          # ---------- Linux 平台 ----------
          # 支持：Ubuntu Focal Fossa 20.04 + clang 12
          # 参考：INSTALL.md 中的 "Linux dependencies" 章节
          - os: ubuntu-latest
            skia_url: Skia-Linux-Release-x64.zip
            skia_arch: x64
            platform_name: Linux
            exe_name: aseprite
            generator: Ninja
            # Linux 特定参数：必须使用 libstdc++ 以兼容预编译的 Skia
            # 参考：INSTALL.md "Linux details" 章节
            cmake_extra: "-DCMAKE_CXX_FLAGS:STRING=-stdlib=libstdc++ -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libstdc++"
            osx_deployment: ""
            osx_sysroot: ""
            osx_arch: ""

          # ---------- macOS 平台 ----------
          # 支持：macOS 15.2 Sequoia + Xcode 16.3 + macOS 15.4 SDK
          # 参考：INSTALL.md 中的 "macOS dependencies" 章节
          - os: macos-latest
            skia_url: Skia-macOS-Release-arm64.zip      # ARM64 版本（Apple Silicon）
            skia_arch: arm64
            platform_name: macOS
            exe_name: aseprite
            generator: Ninja
            # macOS 特定参数
            # 参考：INSTALL.md "Apple Silicon" 章节
            cmake_extra: "-DPNG_ARM_NEON:STRING=on"
            # macOS 部署目标：最低支持 macOS 11.0（Apple Silicon）
            # 参考：INSTALL.md 中 "-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0"
            osx_deployment: "11.0"
            # macOS SDK 路径：使用 Xcode 自带的 SDK
            # 参考：INSTALL.md 中 "-DCMAKE_OSX_SYSROOT=..."
            osx_sysroot: "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk"
            # macOS 目标架构：ARM64（Apple Silicon M1/M2/M3）
            osx_arch: "arm64"
      
      # 即使某个平台构建失败，也继续构建其他平台
      fail-fast: false

    # ==========================================================================
    # 构建步骤
    # ==========================================================================
    steps:
      # ------------------------------------------------------------------------
      # 步骤 1：安装 Linux 依赖
      # 参考：INSTALL.md "Linux dependencies" 章节
      # ------------------------------------------------------------------------
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # 安装 Ubuntu/Debian 依赖包
          # 包括：编译器、构建工具、图形库、字体库等
          sudo apt-get update -qq
          sudo apt-get install -y \
            g++ clang cmake ninja-build unzip \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libgl1-mesa-dev libfontconfig1-dev jq

      # ------------------------------------------------------------------------
      # 步骤 2：检出当前仓库代码
      # ------------------------------------------------------------------------
      - uses: actions/checkout@v4
      
      # ------------------------------------------------------------------------
      # 步骤 3：克隆 Aseprite 源代码
      # 参考：INSTALL.md "Get the source code" 章节
      # ------------------------------------------------------------------------
      - name: Clone Aseprite source
        shell: bash
        run: |
          # --recurse-submodules: 克隆所有子模块（依赖库）
          # -j8: 并行下载 8 个子模块，加速克隆
          # --branch: 切换到指定 Tag（版本）
          git clone --recurse-submodules -j8 \
            https://github.com/${{ env.ASEPRITE_REPO }} \
            --branch ${{ needs.fetch-aseprite-info.outputs.release-tag }}

      # ------------------------------------------------------------------------
      # 步骤 4：设置版本号
      # 修改 src/ver/CMakeLists.txt 中的版本号，替换 "1.x-dev"
      # 参考：src/ver/CMakeLists.txt 中的 set(VERSION "1.x-dev")
      # 注意：使用 @ 作为 sed 分隔符，避免版本号中的 . 造成转义问题
      # ------------------------------------------------------------------------
      - name: Set version number
        working-directory: aseprite
        shell: bash
        run: |
          # 从 Release Tag 中提取版本号（去掉 'v' 前缀）
          # 例如：v1.3.17 -> 1.3.17
          RAW_VERSION="${{ needs.fetch-aseprite-info.outputs.release-tag }}"
          CLEAN_VERSION=${RAW_VERSION#v}
          echo "Setting version to: $CLEAN_VERSION"
          
          # 修改 src/ver/CMakeLists.txt 中的 VERSION 定义
          # 将 set(VERSION "1.x-dev") 替换为 set(VERSION "1.3.17")
          # 使用 @ 作为分隔符，避免版本号中的 . 造成问题
          if [ -f "src/ver/CMakeLists.txt" ]; then
            sed -i "s@set(VERSION \".*\")@set(VERSION \"$CLEAN_VERSION\")@" src/ver/CMakeLists.txt
            echo "✓ Modified src/ver/CMakeLists.txt"
            
            # 验证修改结果
            echo "Version line after modification:"
            grep "set(VERSION" src/ver/CMakeLists.txt || echo "⚠ Version line not found"
          else
            echo "⚠ Warning: src/ver/CMakeLists.txt not found"
            exit 1
          fi
          
          # 保存纯净版本号供后续步骤使用
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
        id: set-version

      # ------------------------------------------------------------------------
      # 步骤 5：从 INSTALL.md 提取 Skia 版本
      # 参考：INSTALL.md 中的 "And a compiled version of the aseprite-m124 branch"
      # ------------------------------------------------------------------------
      - name: Get Skia version from INSTALL.md
        working-directory: aseprite
        shell: bash
        run: |
          if [ -f "INSTALL.md" ]; then
            # 提取 aseprite-mXXX 格式的分支名
            SKIA_BRANCH=$(grep -oP 'aseprite-m\d+' INSTALL.md | head -1)
            echo "skia_branch=$SKIA_BRANCH" >> $GITHUB_OUTPUT
            
            # 将分支名映射到实际的 Release 版本号
            # 例如：aseprite-m124 -> m124-08a5439a6b
            case "$SKIA_BRANCH" in
              "aseprite-m124")
                SKIA_VERSION="m124-08a5439a6b"
                ;;
              "aseprite-m102")
                SKIA_VERSION="m102-..."
                ;;
              *)
                # 如果分支名未知，使用默认的稳定版本
                SKIA_VERSION="m124-08a5439a6b"
                echo "⚠ Unknown Skia branch, using default: $SKIA_VERSION"
                ;;
            esac
            
            echo "skia_version=$SKIA_VERSION" >> $GITHUB_OUTPUT
            echo "✓ Found Skia: $SKIA_BRANCH -> $SKIA_VERSION"
          else
            # 如果 INSTALL.md 不存在，使用默认版本
            echo "skia_branch=aseprite-m124" >> $GITHUB_OUTPUT
            echo "skia_version=m124-08a5439a6b" >> $GITHUB_OUTPUT
            echo "⚠ INSTALL.md not found, using default Skia version"
          fi
        id: skia-info

      # ------------------------------------------------------------------------
      # 步骤 6：缓存 Skia 库
      # 加速后续构建，避免重复下载
      # 使用 actions/cache@v4 支持 Node.js 24
      # ------------------------------------------------------------------------
      - name: Cache Skia
        uses: actions/cache@v4
        with:
          path: aseprite/skia                          # 缓存目录
          # 缓存键：平台 + Skia 版本
          key: skia-${{ matrix.platform_name }}-${{ steps.skia-info.outputs.skia_version }}
          # 如果精确匹配失败，尝试使用前缀匹配
          restore-keys: |
            skia-${{ matrix.platform_name }}-

      # ------------------------------------------------------------------------
      # 步骤 7：下载 Skia 预编译包
      # 参考：INSTALL.md "Dependencies" 章节
      # ------------------------------------------------------------------------
      - name: Download Skia
        working-directory: aseprite
        shell: bash
        run: |
          SKIA_VER="${{ steps.skia-info.outputs.skia_version }}"
          # 构建下载 URL
          SKIA_URL="https://github.com/aseprite/skia/releases/download/${SKIA_VER}/${{ matrix.skia_url }}"
          
          # 如果缓存目录为空，则下载
          if [ ! -d "skia" ] || [ -z "$(ls -A skia)" ]; then
            echo "Downloading Skia from: $SKIA_URL"
            
            # Windows 需要安装 wget
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              choco install wget -y --no-progress
            fi
            
            # 下载并解压到 skia 目录
            wget -q "$SKIA_URL"
            unzip -q *.zip -d skia
            rm *.zip
            echo "✓ Skia downloaded"
          else
            echo "✓ Skia cache hit"
          fi

      # ------------------------------------------------------------------------
      # 步骤 8：安装 Ninja 构建系统
      # 参考：INSTALL.md "Dependencies" 章节
      # ------------------------------------------------------------------------
      - uses: aseprite/get-ninja@main

      # ------------------------------------------------------------------------
      # 步骤 9：配置 MSVC 开发环境（仅 Windows）
      # 参考：INSTALL.md "Windows details" 章节
      # ------------------------------------------------------------------------
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64

      # ------------------------------------------------------------------------
      # 步骤 10：生成 Makefiles（CMake 配置）
      # 参考：INSTALL.md "Manual Building" 章节
      # 注意：Windows 使用 Ninja 生成器，不要使用 -T ClangCL
      # ------------------------------------------------------------------------
      - name: Generating Makefiles
        working-directory: aseprite
        shell: bash
        run: |
          # 设置环境变量
          export enable_ccache=off      # 禁用 ccache（GitHub Actions 自带缓存）
          export laf_backend=skia       # 使用 Skia 后端
          export enable_scripting=on    # 启用脚本支持（JavaScript）
          export skia_arch="${{ matrix.skia_arch }}"
          
          # Linux 需要设置编译器为 clang
          # 参考：INSTALL.md "Linux details" 章节
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export CC=clang
            export CXX=clang++
          fi
          
          # 构建 CMake 命令
          # -S .: 源码目录
          # -B build: 构建目录
          # -G ${{ matrix.generator }}: 使用矩阵中定义的生成器
          CMAKE_CMD="cmake -S . -B build -G ${{ matrix.generator }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch) \
            -DVERSION=\"${{ steps.set-version.outputs.clean_version }}\""
          
          # macOS 特定参数
          # 参考：INSTALL.md "macOS details" 和 "Apple Silicon" 章节
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            CMAKE_CMD="$CMAKE_CMD \
              -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.osx_deployment }} \
              -DCMAKE_OSX_SYSROOT=${{ matrix.osx_sysroot }}"
          fi
          
          # 添加平台特定参数
          if [[ -n "${{ matrix.cmake_extra }}" ]]; then
            CMAKE_CMD="$CMAKE_CMD ${{ matrix.cmake_extra }}"
          fi
          
          # 执行 CMake 配置
          echo "Running CMake with command:"
          echo "$CMAKE_CMD"
          eval $CMAKE_CMD

      # ------------------------------------------------------------------------
      # 步骤 11：缓存 Ninja 构建产物
      # 加速后续增量编译
      # 使用 actions/cache@v4 支持 Node.js 24
      # ------------------------------------------------------------------------
      - name: Cache Ninja build
        uses: actions/cache@v4
        with:
          path: aseprite/build
          key: build-${{ matrix.platform_name }}-${{ github.sha }}
          restore-keys: |
            build-${{ matrix.platform_name }}-

      # ------------------------------------------------------------------------
      # 步骤 12：编译
      # 参考：INSTALL.md "Manual Building" 章节
      # ------------------------------------------------------------------------
      - name: Compiling
        working-directory: aseprite
        shell: bash
        run: |
          # 进入构建目录并执行 Ninja 编译
          # aseprite 是主可执行文件的目标名称
          cd build && ninja aseprite

      # ------------------------------------------------------------------------
      # 步骤 13：验证构建结果
      # 运行 --version 检查程序是否能正常启动
      # ------------------------------------------------------------------------
      - name: Verify build
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows：直接运行 exe
            ./${{ matrix.exe_name }} --version || echo "⚠ Version check skipped"
          else
            # Linux/macOS：先添加执行权限
            chmod +x ./${{ matrix.exe_name }}
            ./${{ matrix.exe_name }} --version || echo "⚠ Version check skipped"
          fi

      # ------------------------------------------------------------------------
      # 步骤 14：清理构建文件夹
      # 只保留可执行文件和 data 目录，减小打包体积
      # ------------------------------------------------------------------------
      - name: Clean Up Build folder
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          # 使用 find 命令删除不需要的文件
          # -maxdepth 1: 只处理当前目录
          # ! -name 'xxx': 排除指定文件
          # -delete: 删除文件
          # 2>/dev/null: 忽略错误信息
          # || true: 即使出错也继续执行
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows：保留 aseprite.exe 和 data 目录
            find . -maxdepth 1 -type f ! -name 'aseprite.exe' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -exec rm -rf {} + 2>/dev/null || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # macOS：保留 aseprite 可执行文件、data 目录和 Aseprite.app 包
            find . -maxdepth 1 -type f ! -name 'aseprite' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -a ! -name 'Aseprite.app' -exec rm -rf {} + 2>/dev/null || true
          else
            # Linux：保留 aseprite 可执行文件和 data 目录
            find . -maxdepth 1 -type f ! -name 'aseprite' -delete 2>/dev/null || true
            find . -maxdepth 1 -type d ! -name 'data' -exec rm -rf {} + 2>/dev/null || true
          fi

      # ------------------------------------------------------------------------
      # 步骤 15：创建便携版标记文件
      # aseprite.ini 文件存在时，Aseprite 会以便携模式运行
      # 配置文件保存在程序目录，而不是用户目录
      # ------------------------------------------------------------------------
      - name: Create portable marker
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          echo '# This file makes Aseprite run in portable mode' > aseprite.ini

      # ------------------------------------------------------------------------
      # 步骤 16：打包
      # 使用 7z 压缩成 ZIP 格式
      # ------------------------------------------------------------------------
      - name: Create release package
        working-directory: aseprite/build/bin
        shell: bash
        run: |
          VERSION="${{ steps.set-version.outputs.clean_version }}"
          PLATFORM="${{ matrix.platform_name }}"
          PACKAGE_NAME="Aseprite-${VERSION}-${PLATFORM}"
          
          # -tzip: 指定 ZIP 格式
          # a: 添加文件到压缩包
          7z -tzip a "${PACKAGE_NAME}.zip" *
          
          # 保存包名供后续步骤使用
          echo "package_name=${PACKAGE_NAME}.zip" >> $GITHUB_OUTPUT
          echo "✓ Created: ${PACKAGE_NAME}.zip"
        id: package

      # ------------------------------------------------------------------------
      # 步骤 17：上传到 GitHub Release
      # 使用 svenstaro/upload-release-action@v2 上传附件
      # ------------------------------------------------------------------------
      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/${{ steps.package.outputs.package_name }}
          asset_name: ${{ steps.package.outputs.package_name }}
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}

      # ------------------------------------------------------------------------
      # 步骤 18：构建失败通知
      # 在 Issue #1 中创建评论通知构建失败
      # 使用 actions/github-script@v7 支持 Node.js 24
      # ------------------------------------------------------------------------
      - name: Notify on failure
        if: failure()               # 只有在上一步失败时才执行
        uses: actions/github-script@v7
        with:
          script: |
            // 尝试获取 Issue #1
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1
            }).catch(() => null);
            
            // 如果 Issue #1 存在，创建评论
            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body: `❌ **构建失败！**
                
                - 平台: ${{ matrix.platform_name }}
                - 版本: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
                - 请查看 [构建日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
            }
